<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>どのおおきさかな - 図形クイズゲーム -</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <!-- Title Screen -->
        <section id="screen-title" class="screen active">
            <h1 class="title-logo large">どのおおきさかな？</h1>
            <button id="btn-to-setup" class="btn-primary">はじめる</button>
        </section>

        <!-- Setup Screen -->
        <section id="screen-setup" class="screen">
            <h1 class="title-logo">せってい</h1>
            <div class="setup-layout">
                <!-- Cards Setup -->
                <div class="setup-card">
                    <h2>① 図形カード (1〜6まい)</h2>
                    <p class="desc">問題として出てくる画像を選ぼう</p>
                    <div class="registration-form">
                        <div class="upload-area" id="upload-card-area">
                            <input type="file" id="upload-card-icon" accept="image/*" />
                            <div class="upload-placeholder" id="upload-card-placeholder">
                                <span class="plus-icon">+</span>
                                <p>がぞう追加</p>
                            </div>
                            <img id="preview-card-image" style="display:none;" />
                        </div>
                        <div class="input-controls">
                            <button id="btn-add-card" disabled>ついか</button>
                        </div>
                    </div>
                    <div id="card-list" class="item-list"></div>
                </div>

                <!-- Players Setup -->
                <div class="setup-card">
                    <h2>② プレイヤー (1〜6にん)</h2>
                    <p class="desc">あそぶ人の名前と顔写真</p>
                    <div class="registration-form">
                        <div class="upload-area round" id="upload-player-area">
                            <input type="file" id="upload-player-icon" accept="image/*" />
                            <div class="upload-placeholder" id="upload-player-placeholder">
                                <span class="plus-icon">+</span>
                                <p>かおしゃしん</p>
                            </div>
                            <img id="preview-player-image" style="display:none;" />
                        </div>
                        <div class="input-controls">
                            <input type="text" id="input-player-name" placeholder="なまえ" autocomplete="off"
                                maxlength="8" />
                            <button id="btn-add-player" disabled>ついか</button>
                        </div>
                    </div>
                    <div id="player-list" class="item-list round-items"></div>
                </div>

                <!-- Turns & Start -->
                <div class="setup-card bottom-card">
                    <h2>③ ターンすう</h2>
                    <div class="turn-control">
                        <label for="input-turns">ぜんいんで何回あそぶ？</label>
                        <select id="input-turns">
                            <option value="1">1 ターン</option>
                            <option value="2">2 ターン</option>
                            <option value="3" selected>3 ターン</option>
                            <option value="4">4 ターン</option>
                            <option value="5">5 ターン</option>
                            <option value="6">6 ターン</option>
                            <option value="7">7 ターン</option>
                            <option value="8">8 ターン</option>
                            <option value="9">9 ターン</option>
                            <option value="10">10 ターン</option>
                        </select>
                    </div>
                    <button id="btn-start" class="btn-primary" disabled>ゲームスタート</button>
                </div>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="screen-game" class="screen">
            <!-- Turn Overlay -->
            <div id="turn-overlay" class="turn-overlay hidden">
                <img id="turn-overlay-icon" class="turn-large-icon" />
                <h2 id="turn-overlay-name"></h2>
                <p class="blink-text">タップしてスタート！</p>
            </div>

            <div id="game-header">
                <div class="turn-info">
                    <span id="turn-display">ターン 1/3</span>
                    <span class="divider">|</span>
                    <img id="current-player-icon" class="small-icon" />
                    <span id="current-player-name"></span>のばん
                </div>
                <div class="score-display">スコア: <span id="current-score">0</span>pt</div>
            </div>

            <div class="game-board" id="game-board">
                <!-- Top: Targets -->
                <div id="targets-layer" class="layer top-half">
                    <div class="target-slot" id="slot-0"></div>
                    <div class="target-slot" id="slot-1"></div>
                    <div class="target-slot" id="slot-2"></div>
                    <div class="target-slot" id="slot-3"></div>
                    <div class="target-slot" id="slot-4"></div>
                </div>
                <!-- Bottom: Draggable spawn -->
                <div id="draggables-layer" class="layer bottom-half"></div>

                <div id="feedback-message" class="hidden"></div>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="screen-result" class="screen">
            <div class="confetti-container" id="confetti-container"></div>
            <h1>けっかはっぴょう</h1>
            <div id="ranking-container" class="ranking-container"></div>
            <button id="btn-restart" class="btn-primary">タイトルへ</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
